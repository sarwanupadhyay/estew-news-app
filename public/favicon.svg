<?xml version="1.0" encoding="UTF-8"?>
<!--
  Browser-tab icon for Estew.

  We embed /images/Estew-logo.png inside an SVG wrapper that applies a
  rounded clipPath, so the PNG always renders with the same rounded-corner
  shape as native app icons regardless of whether the source PNG itself
  has rounded corners. A white background sits behind the image so the
  logo stays legible against dark browser chrome.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <clipPath id="estew-favicon-rounded">
      <rect x="0" y="0" width="64" height="64" rx="14" ry="14" />
    </clipPath>
  </defs>
  <g clip-path="url(#estew-favicon-rounded)">
    <rect x="0" y="0" width="64" height="64" fill="#FFFFFF" />
    <image
      href="/images/Estew-logo.png"
      x="0"
      y="0"
      width="64"
      height="64"
      preserveAspectRatio="xMidYMid meet"
    />
  </g>
</svg>
